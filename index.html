<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rock Paper Scissors</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=DM+Sans:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #07070f;
      --surface: #10101c;
      --border: #2a2a3a;
      --accent: #f0e040;
      --accent2: #ff6b6b;
      --accent3: #6bffd8;
      --accent4: #c084fc;
      --text: #f0eedc;
      --muted: #6a6a8a;
      --win: #6bffd8;
      --lose: #ff6b6b;
      --draw: #f0e040;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      overflow-x: hidden;
      position: relative;
    }

    /* ── ANIMATED BACKGROUND ── */
    #bg-canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    /* Pixel grid overlay */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(107,255,216,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(107,255,216,0.025) 1px, transparent 1px);
      background-size: 32px 32px;
      pointer-events: none;
      z-index: 1;
    }

    /* Scanlines */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 3px,
        rgba(0,0,0,0.12) 3px,
        rgba(0,0,0,0.12) 4px
      );
      pointer-events: none;
      z-index: 2;
    }

    /* Glowing orbs */
    .orb {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
      filter: blur(80px);
      animation: pulse-orb 8s ease-in-out infinite;
    }
    .orb-1 { width: 400px; height: 400px; background: rgba(192,132,252,0.12); top: -100px; left: -100px; animation-delay: 0s; }
    .orb-2 { width: 350px; height: 350px; background: rgba(107,255,216,0.10); bottom: -80px; right: -80px; animation-delay: -3s; }
    .orb-3 { width: 300px; height: 300px; background: rgba(240,224,64,0.07); top: 50%; left: 50%; transform: translate(-50%,-50%); animation-delay: -5s; }

    @keyframes pulse-orb {
      0%, 100% { opacity: 0.6; transform: scale(1); }
      50%       { opacity: 1;   transform: scale(1.15); }
    }
    .orb-3 { animation-name: pulse-orb-center; }
    @keyframes pulse-orb-center {
      0%, 100% { opacity: 0.4; transform: translate(-50%,-50%) scale(1); }
      50%       { opacity: 0.8; transform: translate(-50%,-50%) scale(1.2); }
    }

    /* ── WRAPPER ── */
    .wrapper {
      position: relative;
      z-index: 3;
      width: 100%;
      max-width: 560px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.25rem;
    }

    /* ── TITLE ── */
    .title {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(0.75rem, 2.5vw, 1rem);
      color: var(--accent);
      text-align: center;
      line-height: 1.9;
      text-shadow: 0 0 30px rgba(240,224,64,0.6), 0 0 60px rgba(240,224,64,0.2);
      letter-spacing: 0.06em;
    }
    .title span { color: var(--accent3); text-shadow: 0 0 20px rgba(107,255,216,0.6); }

    /* ── MODE TOGGLE ── */
    .mode-toggle {
      display: flex;
      gap: 2px;
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 3px;
      width: 100%;
    }

    .mode-btn {
      flex: 1;
      font-family: 'Press Start 2P', monospace;
      font-size: 0.45rem;
      letter-spacing: 0.08em;
      padding: 0.6rem 0.5rem;
      border: none;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.2s;
    }

    .mode-btn.active {
      background: var(--accent);
      color: #000;
    }

    /* ── SCOREBOARD ── */
    .scoreboard {
      display: flex;
      gap: 1rem;
      width: 100%;
    }

    .score-box {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-top: 2px solid var(--accent);
      padding: 0.9rem 1rem;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .score-box::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      opacity: 0.3;
    }

    .score-box.p2-box { border-top-color: var(--accent4); }
    .score-box.cpu-box { border-top-color: var(--accent2); }

    .score-label {
      font-family: 'Press Start 2P', monospace;
      font-size: 0.45rem;
      color: var(--muted);
      letter-spacing: 0.12em;
      margin-bottom: 0.4rem;
    }

    .score-num {
      font-family: 'Press Start 2P', monospace;
      font-size: 2rem;
      color: var(--text);
      text-shadow: 0 0 10px rgba(240,224,64,0.3);
    }

    /* ── TURN INDICATOR ── */
    .turn-indicator {
      width: 100%;
      text-align: center;
      font-family: 'Press Start 2P', monospace;
      font-size: 0.5rem;
      letter-spacing: 0.1em;
      padding: 0.6rem;
      border: 1px solid var(--border);
      background: var(--surface);
      display: none;
    }
    .turn-indicator.p1 { color: var(--accent); border-color: var(--accent); }
    .turn-indicator.p2 { color: var(--accent4); border-color: var(--accent4); }

    /* ── ARENA ── */
    .arena {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      min-height: 150px;
      position: relative;
    }

    .arena-vs {
      font-family: 'Press Start 2P', monospace;
      font-size: 0.55rem;
      color: var(--border);
      letter-spacing: 0.1em;
      flex-shrink: 0;
    }

    /* Pixel corner brackets */
    .arena::before, .arena::after {
      content: '';
      position: absolute;
      width: 10px; height: 10px;
      border-style: solid;
      border-color: var(--accent3);
    }
    .arena::before { top: -1px; left: -1px;  border-width: 2px 0 0 2px; }
    .arena::after  { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }

    .fighter {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      flex: 1;
    }

    .fighter-label {
      font-family: 'Press Start 2P', monospace;
      font-size: 0.42rem;
      color: var(--muted);
      letter-spacing: 0.12em;
    }

    .hand-display {
      width: 90px;
      height: 90px;
      border: 1px solid var(--border);
      background: #090912;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.25s;
      position: relative;
      overflow: hidden;
    }

    .hand-display svg { width: 58px; height: 58px; }

    .hand-display .placeholder {
      font-family: 'Press Start 2P', monospace;
      font-size: 0.5rem;
      color: var(--border);
      letter-spacing: 0;
    }

    .hand-display.shake { animation: arcade-shake 0.45s ease; }

    .hand-display.winner {
      border-color: var(--win);
      box-shadow: 0 0 20px rgba(107,255,216,0.35), inset 0 0 20px rgba(107,255,216,0.05);
    }
    .hand-display.loser {
      border-color: var(--lose);
      opacity: 0.45;
    }
    .hand-display.hidden-choice {
      border-color: var(--accent4);
      box-shadow: 0 0 16px rgba(192,132,252,0.3);
    }

    @keyframes arcade-shake {
      0%   { transform: translateY(0) rotate(0deg); }
      20%  { transform: translateY(-10px) rotate(-4deg); }
      40%  { transform: translateY(7px) rotate(4deg); }
      60%  { transform: translateY(-6px) rotate(-2deg); }
      80%  { transform: translateY(4px) rotate(2deg); }
      100% { transform: translateY(0) rotate(0deg); }
    }

    /* ── RESULT BAR ── */
    .result-bar {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 0.9rem 1.25rem;
      text-align: center;
      font-family: 'Press Start 2P', monospace;
      font-size: 0.55rem;
      color: var(--muted);
      letter-spacing: 0.05em;
      line-height: 1.9;
      min-height: 54px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .result-bar.win  { color: var(--win);  border-color: var(--win);  box-shadow: 0 0 12px rgba(107,255,216,0.15); }
    .result-bar.lose { color: var(--lose); border-color: var(--lose); box-shadow: 0 0 12px rgba(255,107,107,0.15); }
    .result-bar.draw { color: var(--draw); border-color: var(--draw); box-shadow: 0 0 12px rgba(240,224,64,0.15);  }
    .result-bar.p1win { color: var(--accent);  border-color: var(--accent); }
    .result-bar.p2win { color: var(--accent4); border-color: var(--accent4); }

    /* ── COVER SCREEN (2P mode) ── */
    .cover-screen {
      display: none;
      width: 100%;
      background: var(--surface);
      border: 2px solid var(--accent4);
      padding: 2rem;
      text-align: center;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      box-shadow: 0 0 30px rgba(192,132,252,0.2);
    }
    .cover-screen.active { display: flex; }

    .cover-title {
      font-family: 'Press Start 2P', monospace;
      font-size: 0.6rem;
      color: var(--accent4);
      letter-spacing: 0.08em;
      line-height: 2;
    }

    .cover-btn {
      font-family: 'Press Start 2P', monospace;
      font-size: 0.5rem;
      color: #000;
      background: var(--accent4);
      border: none;
      padding: 0.8rem 1.5rem;
      cursor: pointer;
      letter-spacing: 0.08em;
      transition: opacity 0.15s;
    }
    .cover-btn:hover { opacity: 0.85; }

    /* ── CHOICES ── */
    .choices {
      display: flex;
      gap: 0.6rem;
      width: 100%;
    }

    .choice-btn {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 1rem 0.5rem;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.6rem;
      transition: border-color 0.15s, transform 0.15s, background 0.15s, box-shadow 0.15s;
      color: var(--text);
    }

    .choice-btn:hover {
      border-color: var(--accent);
      background: rgba(240,224,64,0.04);
      transform: translateY(-3px);
      box-shadow: 0 6px 20px rgba(240,224,64,0.1);
    }
    .choice-btn:active { transform: scale(0.96) translateY(0); }

    .choice-btn svg { width: 50px; height: 50px; }

    .choice-name {
      font-family: 'Press Start 2P', monospace;
      font-size: 0.42rem;
      color: var(--muted);
      letter-spacing: 0.08em;
    }

    /* ── BOTTOM CONTROLS ── */
    .bottom-row {
      display: flex;
      gap: 0.6rem;
      width: 100%;
    }

    .reset-btn {
      flex: 1;
      font-family: 'Press Start 2P', monospace;
      font-size: 0.45rem;
      color: var(--muted);
      background: transparent;
      border: 1px solid var(--border);
      padding: 0.6rem 1rem;
      cursor: pointer;
      letter-spacing: 0.06em;
      transition: color 0.15s, border-color 0.15s;
    }
    .reset-btn:hover { color: var(--accent2); border-color: var(--accent2); }

    /* ── HISTORY ── */
    .history { width: 100%; }

    .history-title {
      font-family: 'Press Start 2P', monospace;
      font-size: 0.42rem;
      color: var(--muted);
      letter-spacing: 0.12em;
      margin-bottom: 0.5rem;
    }

    .history-list { display: flex; flex-direction: column; gap: 3px; }

    .history-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 2px solid var(--border);
      padding: 0.4rem 0.75rem;
      font-size: 0.78rem;
      color: var(--muted);
      transition: border-left-color 0.2s;
    }
    .history-item:hover { border-left-color: var(--accent3); }

    .outcome {
      font-family: 'Press Start 2P', monospace;
      font-size: 0.38rem;
      letter-spacing: 0.1em;
    }
    .outcome.win    { color: var(--win); }
    .outcome.lose   { color: var(--lose); }
    .outcome.draw   { color: var(--draw); }
    .outcome.p1win  { color: var(--accent); }
    .outcome.p2win  { color: var(--accent4); }

  </style>
</head>
<body>

  <!-- Background orbs -->
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <!-- Animated particle canvas -->
  <canvas id="bg-canvas"></canvas>

<div class="wrapper">

  <div class="title">ROCK<br/>PAPER<br/><span>SCISSORS</span></div>

  <!-- Mode toggle -->
  <div class="mode-toggle">
    <button class="mode-btn active" id="btn-cpu" onclick="setMode('cpu')">VS CPU</button>
    <button class="mode-btn" id="btn-2p" onclick="setMode('2p')">2 PLAYER</button>
  </div>

  <!-- Scoreboard -->
  <div class="scoreboard">
    <div class="score-box" id="p1-score-box">
      <div class="score-label" id="p1-label">PLAYER</div>
      <div class="score-num" id="p-score">00</div>
    </div>
    <div class="score-box cpu-box" id="p2-score-box">
      <div class="score-label" id="p2-label">CPU</div>
      <div class="score-num" id="c-score">00</div>
    </div>
  </div>

  <!-- Turn indicator (2P only) -->
  <div class="turn-indicator" id="turn-indicator"></div>

  <!-- Arena -->
  <div class="arena">
    <div class="fighter">
      <div class="fighter-label" id="p1-fighter-label">YOU</div>
      <div class="hand-display" id="p-hand"><span class="placeholder">?</span></div>
    </div>
    <div class="arena-vs">VS</div>
    <div class="fighter">
      <div class="fighter-label" id="p2-fighter-label">CPU</div>
      <div class="hand-display" id="c-hand"><span class="placeholder">?</span></div>
    </div>
  </div>

  <!-- 2P Cover screen -->
  <div class="cover-screen" id="cover-screen">
    <div class="cover-title">P1 HAS CHOSEN!<br/>PASS TO PLAYER 2</div>
    <button class="cover-btn" onclick="revealForP2()">P2 READY →</button>
  </div>

  <!-- Result -->
  <div class="result-bar" id="result-bar">CHOOSE YOUR WEAPON</div>

  <!-- Choices -->
  <div class="choices" id="choices-row">
    <button class="choice-btn" onclick="handleChoice('rock')">
      <!-- ROCK SVG (pixel boulder) -->
      <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
        <rect x="22" y="38" width="20" height="7" rx="3" fill="#6b6b88"/>
        <rect x="16" y="28" width="32" height="13" rx="4" fill="#7a7a9a"/>
        <rect x="20" y="19" width="28" height="12" rx="4" fill="#8a8aaa"/>
        <rect x="24" y="14" width="18" height="8"  rx="4" fill="#9090b8"/>
        <rect x="25" y="15" width="8"  height="4"  rx="2" fill="#a8a8cc" opacity="0.7"/>
        <rect x="17" y="30" width="5"  height="3"  rx="1" fill="#9595b5" opacity="0.5"/>
      </svg>
      <span class="choice-name">ROCK</span>
    </button>
    <button class="choice-btn" onclick="handleChoice('paper')">
      <!-- PAPER SVG (document with lines) -->
      <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
        <rect x="15" y="10" width="34" height="44" rx="3" fill="#e8e0c0"/>
        <rect x="15" y="10" width="34" height="7"  rx="3" fill="#d4cc8c"/>
        <rect x="21" y="24" width="22" height="2"  rx="1" fill="#a09878"/>
        <rect x="21" y="30" width="18" height="2"  rx="1" fill="#a09878"/>
        <rect x="21" y="36" width="20" height="2"  rx="1" fill="#a09878"/>
        <rect x="21" y="42" width="14" height="2"  rx="1" fill="#a09878"/>
        <rect x="18" y="13" width="2"  height="2"  rx="1" fill="#fff" opacity="0.4"/>
      </svg>
      <span class="choice-name">PAPER</span>
    </button>
    <button class="choice-btn" onclick="handleChoice('scissors')">
      <!-- SCISSORS SVG (two blades) -->
      <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
        <!-- Handle ring left -->
        <circle cx="18" cy="50" r="8" fill="none" stroke="#8888aa" stroke-width="3"/>
        <circle cx="46" cy="50" r="8" fill="none" stroke="#8888aa" stroke-width="3"/>
        <!-- Blades crossing -->
        <line x1="24" y1="46" x2="46" y2="16" stroke="#aaaacc" stroke-width="5" stroke-linecap="round"/>
        <line x1="40" y1="46" x2="18" y2="16" stroke="#9090b8" stroke-width="5" stroke-linecap="round"/>
        <!-- Center pivot -->
        <circle cx="32" cy="31" r="4" fill="#c084fc"/>
      </svg>
      <span class="choice-name">SCISSORS</span>
    </button>
  </div>

  <!-- Controls -->
  <div class="bottom-row">
    <button class="reset-btn" onclick="resetGame()">[ RESET ]</button>
  </div>

  <!-- History -->
  <div class="history" id="history-wrap" style="display:none">
    <div class="history-title">ROUND LOG</div>
    <div class="history-list" id="history-list"></div>
  </div>

</div>

<script>
// ── SVG icons for arena display ──────────────────────────────
const svgMap = {
  rock: `<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
    <rect x="22" y="38" width="20" height="7" rx="3" fill="#6b6b88"/>
    <rect x="16" y="28" width="32" height="13" rx="4" fill="#7a7a9a"/>
    <rect x="20" y="19" width="28" height="12" rx="4" fill="#8a8aaa"/>
    <rect x="24" y="14" width="18" height="8"  rx="4" fill="#9090b8"/>
    <rect x="25" y="15" width="8"  height="4"  rx="2" fill="#a8a8cc" opacity="0.7"/>
    <rect x="17" y="30" width="5"  height="3"  rx="1" fill="#9595b5" opacity="0.5"/>
  </svg>`,
  paper: `<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
    <rect x="15" y="10" width="34" height="44" rx="3" fill="#e8e0c0"/>
    <rect x="15" y="10" width="34" height="7"  rx="3" fill="#d4cc8c"/>
    <rect x="21" y="24" width="22" height="2"  rx="1" fill="#a09878"/>
    <rect x="21" y="30" width="18" height="2"  rx="1" fill="#a09878"/>
    <rect x="21" y="36" width="20" height="2"  rx="1" fill="#a09878"/>
    <rect x="21" y="42" width="14" height="2"  rx="1" fill="#a09878"/>
    <rect x="18" y="13" width="2"  height="2"  rx="1" fill="#fff" opacity="0.4"/>
  </svg>`,
  scissors: `<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
    <circle cx="18" cy="50" r="8" fill="none" stroke="#8888aa" stroke-width="3"/>
    <circle cx="46" cy="50" r="8" fill="none" stroke="#8888aa" stroke-width="3"/>
    <line x1="24" y1="46" x2="46" y2="16" stroke="#aaaacc" stroke-width="5" stroke-linecap="round"/>
    <line x1="40" y1="46" x2="18" y2="16" stroke="#9090b8" stroke-width="5" stroke-linecap="round"/>
    <circle cx="32" cy="31" r="4" fill="#c084fc"/>
  </svg>`,
  hidden: `<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
    <rect x="12" y="12" width="40" height="40" rx="4" fill="#1a1a2a" stroke="#c084fc" stroke-width="1.5"/>
    <text x="32" y="38" font-family="monospace" font-size="20" fill="#c084fc" text-anchor="middle">?</text>
  </svg>`
};

// ── State ────────────────────────────────────────────────────
const choices = ['rock', 'paper', 'scissors'];
let mode        = 'cpu';   // 'cpu' | '2p'
let p1Score     = 0;
let p2Score     = 0;
let roundLog    = [];
let p2State     = 'idle';  // 'idle' | 'waiting_p2' | 'done'
let p1Choice    = null;

// ── DOM refs ─────────────────────────────────────────────────
const pHand      = document.getElementById('p-hand');
const cHand      = document.getElementById('c-hand');
const resultBar  = document.getElementById('result-bar');
const turnInd    = document.getElementById('turn-indicator');
const coverScr   = document.getElementById('cover-screen');

// ── Mode switch ───────────────────────────────────────────────
function setMode(m) {
  mode = m;
  document.getElementById('btn-cpu').classList.toggle('active', m === 'cpu');
  document.getElementById('btn-2p').classList.toggle('active',  m === '2p');

  const p2box   = document.getElementById('p2-score-box');
  const p2label = document.getElementById('p2-label');
  const p2fig   = document.getElementById('p2-fighter-label');
  const p1fig   = document.getElementById('p1-fighter-label');

  if (m === '2p') {
    p2box.className   = 'score-box p2-box';
    p2label.textContent = 'PLAYER 2';
    p2fig.textContent   = 'P2';
    p1fig.textContent   = 'P1';
    turnInd.style.display = 'block';
    setTurn('p1');
  } else {
    p2box.className   = 'score-box cpu-box';
    p2label.textContent = 'CPU';
    p2fig.textContent   = 'CPU';
    p1fig.textContent   = 'YOU';
    turnInd.style.display = 'none';
    coverScr.classList.remove('active');
  }
  resetGame();
}

function setTurn(who) {
  if (who === 'p1') {
    turnInd.textContent = '▶ PLAYER 1 — CHOOSE YOUR WEAPON';
    turnInd.className   = 'turn-indicator p1';
  } else {
    turnInd.textContent = '▶ PLAYER 2 — CHOOSE YOUR WEAPON';
    turnInd.className   = 'turn-indicator p2';
  }
}

// ── Main input handler ───────────────────────────────────────
function handleChoice(choice) {
  if (mode === 'cpu') {
    playCPU(choice);
  } else {
    play2P(choice);
  }
}

// ── CPU mode ─────────────────────────────────────────────────
function playCPU(playerChoice) {
  const cpuChoice = choices[Math.floor(Math.random() * 3)];
  const result    = getResult(playerChoice, cpuChoice);

  if (result === 'win')  p1Score++;
  if (result === 'lose') p2Score++;

  updateScores();

  // Show hands
  setHand(pHand, playerChoice);
  setHand(cHand, cpuChoice);
  animateHands();

  setTimeout(() => {
    if (result === 'win')  { pHand.classList.add('winner'); cHand.classList.add('loser'); }
    if (result === 'lose') { cHand.classList.add('winner'); pHand.classList.add('loser'); }

    resultBar.className = 'result-bar ' + result;
    if (result === 'win')  resultBar.textContent = `YOU WIN!  ${n(playerChoice)} BEATS ${n(cpuChoice)}`;
    if (result === 'lose') resultBar.textContent = `YOU LOSE!  ${n(cpuChoice)} BEATS ${n(playerChoice)}`;
    if (result === 'draw') resultBar.textContent = `DRAW!  BOTH PICKED ${n(playerChoice)}`;
  }, 450);

  addLog({ playerChoice, cpuChoice, result, label: 'vs CPU' });
}

// ── 2P mode ──────────────────────────────────────────────────
function play2P(choice) {
  if (p2State === 'idle') {
    // P1 just picked — hide it, show cover
    p1Choice = choice;
    setHand(pHand, 'hidden');
    resetHand(cHand);
    resultBar.className = 'result-bar';
    resultBar.textContent = 'P1 HAS CHOSEN — PASS THE DEVICE';
    coverScr.classList.add('active');
    p2State = 'waiting_p2';
  } else if (p2State === 'waiting_p2') {
    // P2 picks
    const result = getResult(p1Choice, choice);
    coverScr.classList.remove('active');

    if (result === 'win')  p1Score++;
    if (result === 'lose') p2Score++;
    updateScores();

    setHand(pHand, p1Choice);
    setHand(cHand, choice);
    animateHands();

    setTimeout(() => {
      if (result === 'win')  { pHand.classList.add('winner'); cHand.classList.add('loser'); }
      if (result === 'lose') { cHand.classList.add('winner'); pHand.classList.add('loser'); }

      const label = result === 'win' ? 'p1win' : result === 'lose' ? 'p2win' : 'draw';
      resultBar.className = 'result-bar ' + label;
      if (result === 'win')  resultBar.textContent = `P1 WINS!  ${n(p1Choice)} BEATS ${n(choice)}`;
      if (result === 'lose') resultBar.textContent = `P2 WINS!  ${n(choice)} BEATS ${n(p1Choice)}`;
      if (result === 'draw') resultBar.textContent = `DRAW!  BOTH PICKED ${n(p1Choice)}`;
    }, 450);

    addLog({ playerChoice: p1Choice, cpuChoice: choice, result,
      label: result === 'win' ? 'P1 WIN' : result === 'lose' ? 'P2 WIN' : 'DRAW',
      outClass: result === 'win' ? 'p1win' : result === 'lose' ? 'p2win' : 'draw'
    });

    p2State = 'idle';
    p1Choice = null;
    setTurn('p1');
  }
}

function revealForP2() {
  coverScr.classList.remove('active');
  setTurn('p2');
  p2State = 'waiting_p2';
}

// ── Helpers ──────────────────────────────────────────────────
function getResult(p, c) {
  if (p === c) return 'draw';
  const wins = { rock: 'scissors', scissors: 'paper', paper: 'rock' };
  return wins[p] === c ? 'win' : 'lose';
}

function n(c) { return c.toUpperCase(); }

function setHand(el, choice) {
  el.classList.remove('winner', 'loser', 'hidden-choice');
  el.innerHTML = svgMap[choice] || '<span class="placeholder">?</span>';
  if (choice === 'hidden') el.classList.add('hidden-choice');
}

function resetHand(el) {
  el.classList.remove('winner', 'loser', 'hidden-choice', 'shake');
  el.innerHTML = '<span class="placeholder">?</span>';
}

function animateHands() {
  pHand.classList.remove('shake', 'winner', 'loser');
  cHand.classList.remove('shake', 'winner', 'loser');
  void pHand.offsetWidth;
  pHand.classList.add('shake');
  cHand.classList.add('shake');
}

function updateScores() {
  document.getElementById('p-score').textContent = String(p1Score).padStart(2, '0');
  document.getElementById('c-score').textContent = String(p2Score).padStart(2, '0');
}

function addLog(entry) {
  roundLog.unshift(entry);
  if (roundLog.length > 6) roundLog.pop();
  renderLog();
}

function renderLog() {
  const wrap = document.getElementById('history-wrap');
  const list = document.getElementById('history-list');
  const names = { rock: 'Rock', paper: 'Paper', scissors: 'Scissors' };
  wrap.style.display = 'block';
  list.innerHTML = roundLog.map(r => {
    const outClass = r.outClass || r.result;
    const outText  = r.label   || r.result.toUpperCase();
    return `<div class="history-item">
      <span>${names[r.playerChoice]} vs ${names[r.cpuChoice]}</span>
      <span class="outcome ${outClass}">${outText}</span>
    </div>`;
  }).join('');
}

function resetGame() {
  p1Score = p2Score = 0;
  roundLog = [];
  p2State  = 'idle';
  p1Choice = null;
  updateScores();
  resetHand(pHand);
  resetHand(cHand);
  resultBar.className   = 'result-bar';
  resultBar.textContent = 'CHOOSE YOUR WEAPON';
  coverScr.classList.remove('active');
  document.getElementById('history-wrap').style.display = 'none';
  if (mode === '2p') setTurn('p1');
}

// ── Particle background ───────────────────────────────────────
const canvas = document.getElementById('bg-canvas');
const ctx    = canvas.getContext('2d');
let particles = [];
const PARTICLE_COUNT = 60;

function resize() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}

function mkParticle() {
  const colors = ['rgba(107,255,216,', 'rgba(192,132,252,', 'rgba(240,224,64,', 'rgba(255,107,107,'];
  const c = colors[Math.floor(Math.random() * colors.length)];
  return {
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    r: Math.random() * 1.5 + 0.3,
    dx: (Math.random() - 0.5) * 0.3,
    dy: (Math.random() - 0.5) * 0.3,
    color: c,
    alpha: Math.random() * 0.5 + 0.1,
    pulse: Math.random() * Math.PI * 2
  };
}

function initParticles() {
  particles = Array.from({ length: PARTICLE_COUNT }, mkParticle);
}

let frame = 0;
function animateParticles() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  frame++;
  particles.forEach(p => {
    p.x += p.dx;
    p.y += p.dy;
    p.pulse += 0.02;
    const a = p.alpha * (0.7 + 0.3 * Math.sin(p.pulse));

    if (p.x < 0) p.x = canvas.width;
    if (p.x > canvas.width) p.x = 0;
    if (p.y < 0) p.y = canvas.height;
    if (p.y > canvas.height) p.y = 0;

    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fillStyle = p.color + a + ')';
    ctx.fill();
  });
  requestAnimationFrame(animateParticles);
}

resize();
initParticles();
animateParticles();
window.addEventListener('resize', () => { resize(); });
</script>
