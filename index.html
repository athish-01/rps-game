<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rock Paper Scissors</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=DM+Sans:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #07070f;
      --surface: #10101c;
      --border: #2a2a3a;
      --accent: #f0e040;
      --accent2: #ff6b6b;
      --accent3: #6bffd8;
      --accent4: #c084fc;
      --text: #f0eedc;
      --muted: #6a6a8a;
      --win: #6bffd8;
      --lose: #ff6b6b;
      --draw: #f0e040;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      overflow-x: hidden;
      position: relative;
    }
    #bg-canvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
    body::after {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(107,255,216,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(107,255,216,0.025) 1px, transparent 1px);
      background-size: 32px 32px;
      pointer-events: none; z-index: 1;
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.12) 3px, rgba(0,0,0,0.12) 4px);
      pointer-events: none; z-index: 2;
    }
    .orb { position: fixed; border-radius: 50%; pointer-events: none; z-index: 0; filter: blur(80px); animation: pulse-orb 8s ease-in-out infinite; }
    .orb-1 { width: 400px; height: 400px; background: rgba(192,132,252,0.12); top: -100px; left: -100px; animation-delay: 0s; }
    .orb-2 { width: 350px; height: 350px; background: rgba(107,255,216,0.10); bottom: -80px; right: -80px; animation-delay: -3s; }
    .orb-3 { width: 300px; height: 300px; background: rgba(240,224,64,0.07); top: 50%; left: 50%; transform: translate(-50%,-50%); animation-delay: -5s; }
    @keyframes pulse-orb { 0%,100%{opacity:0.6;transform:scale(1)} 50%{opacity:1;transform:scale(1.15)} }
    .orb-3 { animation-name: pulse-orb-center; }
    @keyframes pulse-orb-center { 0%,100%{opacity:0.4;transform:translate(-50%,-50%) scale(1)} 50%{opacity:0.8;transform:translate(-50%,-50%) scale(1.2)} }

    .wrapper { position: relative; z-index: 3; width: 100%; max-width: 560px; display: flex; flex-direction: column; align-items: center; gap: 1.25rem; }

    .title { font-family: 'Press Start 2P', monospace; font-size: clamp(0.75rem, 2.5vw, 1rem); color: var(--accent); text-align: center; line-height: 1.9; text-shadow: 0 0 30px rgba(240,224,64,0.6), 0 0 60px rgba(240,224,64,0.2); letter-spacing: 0.06em; }
    .title span { color: var(--accent3); text-shadow: 0 0 20px rgba(107,255,216,0.6); }

    .mode-toggle { display: flex; gap: 2px; background: var(--surface); border: 1px solid var(--border); padding: 3px; width: 100%; }
    .mode-btn { flex: 1; font-family: 'Press Start 2P', monospace; font-size: 0.45rem; letter-spacing: 0.08em; padding: 0.6rem 0.5rem; border: none; background: transparent; color: var(--muted); cursor: pointer; transition: all 0.2s; }
    .mode-btn.active { background: var(--accent); color: #000; }
    .mode-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .scoreboard { display: flex; gap: 1rem; width: 100%; }
    .score-box { flex: 1; background: var(--surface); border: 1px solid var(--border); border-top: 2px solid var(--accent); padding: 0.9rem 1rem; text-align: center; position: relative; overflow: hidden; }
    .score-box::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, var(--accent), transparent); opacity: 0.3; }
    .score-box.p2-box { border-top-color: var(--accent4); }
    .score-box.cpu-box { border-top-color: var(--accent2); }
    .score-label { font-family: 'Press Start 2P', monospace; font-size: 0.45rem; color: var(--muted); letter-spacing: 0.12em; margin-bottom: 0.4rem; }
    .score-num { font-family: 'Press Start 2P', monospace; font-size: 2rem; color: var(--text); text-shadow: 0 0 10px rgba(240,224,64,0.3); }

    .turn-indicator { width: 100%; text-align: center; font-family: 'Press Start 2P', monospace; font-size: 0.5rem; letter-spacing: 0.1em; padding: 0.6rem; border: 1px solid var(--border); background: var(--surface); display: none; }
    .turn-indicator.p1 { color: var(--accent); border-color: var(--accent); }
    .turn-indicator.p2 { color: var(--accent4); border-color: var(--accent4); }
    .turn-indicator.online { color: var(--accent3); border-color: var(--accent3); }

    .arena { width: 100%; background: var(--surface); border: 1px solid var(--border); padding: 1.5rem; display: flex; align-items: center; justify-content: space-between; gap: 1rem; min-height: 150px; position: relative; }
    .arena-vs { font-family: 'Press Start 2P', monospace; font-size: 0.55rem; color: var(--border); letter-spacing: 0.1em; flex-shrink: 0; }
    .arena::before, .arena::after { content: ''; position: absolute; width: 10px; height: 10px; border-style: solid; border-color: var(--accent3); }
    .arena::before { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
    .arena::after  { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }

    .fighter { display: flex; flex-direction: column; align-items: center; gap: 0.5rem; flex: 1; }
    .fighter-label { font-family: 'Press Start 2P', monospace; font-size: 0.42rem; color: var(--muted); letter-spacing: 0.12em; }

    .hand-display { width: 90px; height: 90px; border: 1px solid var(--border); background: #090912; display: flex; align-items: center; justify-content: center; transition: all 0.25s; position: relative; overflow: hidden; }
    .hand-display svg { width: 58px; height: 58px; }
    .hand-display .placeholder { font-family: 'Press Start 2P', monospace; font-size: 0.5rem; color: var(--border); letter-spacing: 0; }
    .hand-display.shake { animation: arcade-shake 0.45s ease; }
    .hand-display.winner { border-color: var(--win); box-shadow: 0 0 20px rgba(107,255,216,0.35), inset 0 0 20px rgba(107,255,216,0.05); }
    .hand-display.loser  { border-color: var(--lose); opacity: 0.45; }
    .hand-display.hidden-choice { border-color: var(--accent4); box-shadow: 0 0 16px rgba(192,132,252,0.3); }

    @keyframes arcade-shake {
      0%  { transform: translateY(0) rotate(0deg); }
      20% { transform: translateY(-10px) rotate(-4deg); }
      40% { transform: translateY(7px) rotate(4deg); }
      60% { transform: translateY(-6px) rotate(-2deg); }
      80% { transform: translateY(4px) rotate(2deg); }
      100%{ transform: translateY(0) rotate(0deg); }
    }

    .result-bar { width: 100%; background: var(--surface); border: 1px solid var(--border); padding: 0.9rem 1.25rem; text-align: center; font-family: 'Press Start 2P', monospace; font-size: 0.55rem; color: var(--muted); letter-spacing: 0.05em; line-height: 1.9; min-height: 54px; display: flex; align-items: center; justify-content: center; }
    .result-bar.win  { color: var(--win);  border-color: var(--win);  box-shadow: 0 0 12px rgba(107,255,216,0.15); }
    .result-bar.lose { color: var(--lose); border-color: var(--lose); box-shadow: 0 0 12px rgba(255,107,107,0.15); }
    .result-bar.draw { color: var(--draw); border-color: var(--draw); box-shadow: 0 0 12px rgba(240,224,64,0.15); }
    .result-bar.p1win { color: var(--accent);  border-color: var(--accent); }
    .result-bar.p2win { color: var(--accent4); border-color: var(--accent4); }

    .cover-screen { display: none; width: 100%; background: var(--surface); border: 2px solid var(--accent4); padding: 2rem; text-align: center; flex-direction: column; align-items: center; gap: 1rem; box-shadow: 0 0 30px rgba(192,132,252,0.2); }
    .cover-screen.active { display: flex; }
    .cover-title { font-family: 'Press Start 2P', monospace; font-size: 0.6rem; color: var(--accent4); letter-spacing: 0.08em; line-height: 2; }
    .cover-btn { font-family: 'Press Start 2P', monospace; font-size: 0.5rem; color: #000; background: var(--accent4); border: none; padding: 0.8rem 1.5rem; cursor: pointer; letter-spacing: 0.08em; transition: opacity 0.15s; }
    .cover-btn:hover { opacity: 0.85; }

    .choices { display: flex; gap: 0.6rem; width: 100%; }
    .choice-btn { flex: 1; background: var(--surface); border: 1px solid var(--border); padding: 1rem 0.5rem; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 0.6rem; transition: border-color 0.15s, transform 0.15s, background 0.15s, box-shadow 0.15s; color: var(--text); }
    .choice-btn:hover { border-color: var(--accent); background: rgba(240,224,64,0.04); transform: translateY(-3px); box-shadow: 0 6px 20px rgba(240,224,64,0.1); }
    .choice-btn:active { transform: scale(0.96) translateY(0); }
    .choice-btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }
    .choice-btn svg { width: 50px; height: 50px; }
    .choice-name { font-family: 'Press Start 2P', monospace; font-size: 0.42rem; color: var(--muted); letter-spacing: 0.08em; }

    .bottom-row { display: flex; gap: 0.6rem; width: 100%; }
    .reset-btn { flex: 1; font-family: 'Press Start 2P', monospace; font-size: 0.45rem; color: var(--muted); background: transparent; border: 1px solid var(--border); padding: 0.6rem 1rem; cursor: pointer; letter-spacing: 0.06em; transition: color 0.15s, border-color 0.15s; }
    .reset-btn:hover { color: var(--accent2); border-color: var(--accent2); }
    .leave-btn { color: var(--lose) !important; border-color: var(--lose) !important; }
    .leave-btn:hover { color: #fff !important; background: rgba(255,107,107,0.15) !important; }

    .history { width: 100%; }
    .history-title { font-family: 'Press Start 2P', monospace; font-size: 0.42rem; color: var(--muted); letter-spacing: 0.12em; margin-bottom: 0.5rem; }
    .history-list { display: flex; flex-direction: column; gap: 3px; }
    .history-item { display: flex; justify-content: space-between; align-items: center; background: var(--surface); border: 1px solid var(--border); border-left: 2px solid var(--border); padding: 0.4rem 0.75rem; font-size: 0.78rem; color: var(--muted); transition: border-left-color 0.2s; }
    .history-item:hover { border-left-color: var(--accent3); }
    .outcome { font-family: 'Press Start 2P', monospace; font-size: 0.38rem; letter-spacing: 0.1em; }
    .outcome.win  { color: var(--win); }
    .outcome.lose { color: var(--lose); }
    .outcome.draw { color: var(--draw); }
    .outcome.p1win{ color: var(--accent); }
    .outcome.p2win{ color: var(--accent4); }

    .room-row { display: flex; gap: 0.6rem; width: 100%; }
    .room-btn { flex: 1; font-family: 'Press Start 2P', monospace; font-size: 0.42rem; letter-spacing: 0.07em; padding: 0.75rem 0.5rem; border: 1px solid var(--border); background: var(--surface); cursor: pointer; transition: all 0.2s; display: flex; flex-direction: column; align-items: center; gap: 0.4rem; }
    .room-btn-icon { font-size: 1rem; line-height: 1; }
    .room-btn.create { color: var(--accent3); border-color: var(--accent3); }
    .room-btn.create:hover { background: rgba(107,255,216,0.07); box-shadow: 0 0 16px rgba(107,255,216,0.15); }
    .room-btn.join   { color: var(--accent4); border-color: var(--accent4); }
    .room-btn.join:hover { background: rgba(192,132,252,0.07); box-shadow: 0 0 16px rgba(192,132,252,0.15); }
    .room-btn:active { transform: scale(0.97); }

    .room-modal-backdrop { display: none; position: fixed; inset: 0; background: rgba(7,7,15,0.88); z-index: 100; align-items: center; justify-content: center; }
    .room-modal-backdrop.open { display: flex; }
    .room-modal { background: var(--surface); border: 1px solid var(--border); border-top: 2px solid var(--accent3); padding: 2rem; width: 90%; max-width: 340px; display: flex; flex-direction: column; gap: 1rem; position: relative; }
    .room-modal.join-modal { border-top-color: var(--accent4); }
    .room-modal-title { font-family: 'Press Start 2P', monospace; font-size: 0.55rem; letter-spacing: 0.1em; line-height: 2; }
    .room-modal.create-modal .room-modal-title { color: var(--accent3); }
    .room-modal.join-modal   .room-modal-title { color: var(--accent4); }
    .room-modal-body { font-family: 'Press Start 2P', monospace; font-size: 0.42rem; color: var(--muted); letter-spacing: 0.06em; line-height: 2.2; }
    .room-code-display { background: #090912; border: 1px solid var(--accent3); padding: 0.9rem; text-align: center; font-family: 'Press Start 2P', monospace; font-size: 1rem; letter-spacing: 0.3em; color: var(--accent3); }
    .room-input { background: #090912; border: 1px solid var(--border); color: var(--text); font-family: 'Press Start 2P', monospace; font-size: 0.7rem; letter-spacing: 0.3em; padding: 0.75rem; width: 100%; text-align: center; text-transform: uppercase; outline: none; }
    .room-input:focus { border-color: var(--accent4); }
    .room-modal-actions { display: flex; gap: 0.5rem; }
    .room-action-btn { flex: 1; font-family: 'Press Start 2P', monospace; font-size: 0.42rem; letter-spacing: 0.06em; padding: 0.7rem; border: none; cursor: pointer; transition: opacity 0.15s; }
    .room-action-btn:hover { opacity: 0.85; }
    .room-action-btn.primary-create { background: var(--accent3); color: #000; }
    .room-action-btn.primary-join   { background: var(--accent4); color: #000; }
    .room-action-btn.secondary      { background: transparent; border: 1px solid var(--border); color: var(--muted); }
  </style>
</head>
<body>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
  <canvas id="bg-canvas"></canvas>

  <div class="wrapper">
    <div class="title">ROCK<br/>PAPER<br/><span>SCISSORS</span></div>

    <div class="mode-toggle">
      <button class="mode-btn active" id="btn-cpu" onclick="setMode('cpu')">VS CPU</button>
      <button class="mode-btn" id="btn-2p"  onclick="setMode('2p')">2 PLAYER</button>
    </div>

    <div class="scoreboard">
      <div class="score-box" id="p1-score-box">
        <div class="score-label" id="p1-label">PLAYER</div>
        <div class="score-num" id="p-score">00</div>
      </div>
      <div class="score-box cpu-box" id="p2-score-box">
        <div class="score-label" id="p2-label">CPU</div>
        <div class="score-num" id="c-score">00</div>
      </div>
    </div>

    <div class="turn-indicator" id="turn-indicator"></div>

    <div class="arena">
      <div class="fighter">
        <div class="fighter-label" id="p1-fighter-label">YOU</div>
        <div class="hand-display" id="p-hand"><span class="placeholder">?</span></div>
      </div>
      <div class="arena-vs">VS</div>
      <div class="fighter">
        <div class="fighter-label" id="p2-fighter-label">CPU</div>
        <div class="hand-display" id="c-hand"><span class="placeholder">?</span></div>
      </div>
    </div>

    <div class="cover-screen" id="cover-screen">
      <div class="cover-title">P1 HAS CHOSEN!<br/>PASS TO PLAYER 2</div>
      <button class="cover-btn" onclick="revealForP2()">P2 READY →</button>
    </div>

    <div class="result-bar" id="result-bar">CHOOSE YOUR WEAPON</div>

    <div class="choices" id="choices-row">
      <button class="choice-btn" id="btn-rock"     onclick="handleChoice('rock')">
        <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
          <rect x="22" y="38" width="20" height="7" rx="3" fill="#6b6b88"/>
          <rect x="16" y="28" width="32" height="13" rx="4" fill="#7a7a9a"/>
          <rect x="20" y="19" width="28" height="12" rx="4" fill="#8a8aaa"/>
          <rect x="24" y="14" width="18" height="8"  rx="4" fill="#9090b8"/>
          <rect x="25" y="15" width="8"  height="4"  rx="2" fill="#a8a8cc" opacity="0.7"/>
          <rect x="17" y="30" width="5"  height="3"  rx="1" fill="#9595b5" opacity="0.5"/>
        </svg>
        <span class="choice-name">ROCK</span>
      </button>
      <button class="choice-btn" id="btn-paper" onclick="handleChoice('paper')">
        <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
          <rect x="15" y="10" width="34" height="44" rx="3" fill="#e8e0c0"/>
          <rect x="15" y="10" width="34" height="7"  rx="3" fill="#d4cc8c"/>
          <rect x="21" y="24" width="22" height="2"  rx="1" fill="#a09878"/>
          <rect x="21" y="30" width="18" height="2"  rx="1" fill="#a09878"/>
          <rect x="21" y="36" width="20" height="2"  rx="1" fill="#a09878"/>
          <rect x="21" y="42" width="14" height="2"  rx="1" fill="#a09878"/>
          <rect x="18" y="13" width="2"  height="2"  rx="1" fill="#fff" opacity="0.4"/>
        </svg>
        <span class="choice-name">PAPER</span>
      </button>
      <button class="choice-btn" id="btn-scissors" onclick="handleChoice('scissors')">
        <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
          <circle cx="18" cy="50" r="8" fill="none" stroke="#8888aa" stroke-width="3"/>
          <circle cx="46" cy="50" r="8" fill="none" stroke="#8888aa" stroke-width="3"/>
          <line x1="24" y1="46" x2="46" y2="16" stroke="#aaaacc" stroke-width="5" stroke-linecap="round"/>
          <line x1="40" y1="46" x2="18" y2="16" stroke="#9090b8" stroke-width="5" stroke-linecap="round"/>
          <circle cx="32" cy="31" r="4" fill="#c084fc"/>
        </svg>
        <span class="choice-name">SCISSORS</span>
      </button>
    </div>

    <div class="bottom-row">
      <button class="reset-btn" id="reset-btn" onclick="resetGame()">[ RESET ]</button>
      <button class="reset-btn leave-btn" id="leave-btn" onclick="leaveRoom()" style="display:none">[ LEAVE ROOM ]</button>
    </div>

    <div class="room-row" id="room-row">
      <button class="room-btn create" onclick="openCreateRoom()">
        <span class="room-btn-icon">⊞</span>CREATE ROOM
      </button>
      <button class="room-btn join" onclick="openJoinRoom()">
        <span class="room-btn-icon">⊡</span>JOIN ROOM
      </button>
    </div>

    <!-- Create Room Modal -->
    <div class="room-modal-backdrop" id="create-modal-backdrop">
      <div class="room-modal create-modal">
        <div class="room-modal-title">[ CREATE ROOM ]</div>
        <div class="room-modal-body">Share this code with your opponent:</div>
        <div class="room-code-display" id="generated-code">----</div>
        <div class="room-modal-body" id="create-status">Creating room...</div>
        <div class="room-modal-actions">
          <button class="room-action-btn primary-create" onclick="copyRoomCode()">COPY CODE</button>
          <button class="room-action-btn secondary" onclick="cancelCreate()">CANCEL</button>
        </div>
      </div>
    </div>

    <!-- Join Room Modal -->
    <div class="room-modal-backdrop" id="join-modal-backdrop">
      <div class="room-modal join-modal">
        <div class="room-modal-title">[ JOIN ROOM ]</div>
        <div class="room-modal-body">Enter the room code:</div>
        <input class="room-input" id="room-code-input" maxlength="4" placeholder="XXXX"
               oninput="this.value=this.value.toUpperCase()"
               onkeydown="if(event.key==='Enter')submitJoinRoom()"/>
        <div class="room-modal-body" id="join-status" style="min-height:1.5em"></div>
        <div class="room-modal-actions">
          <button class="room-action-btn primary-join" onclick="submitJoinRoom()">JOIN →</button>
          <button class="room-action-btn secondary"    onclick="closeModals()">CANCEL</button>
        </div>
      </div>
    </div>

    <div class="history" id="history-wrap" style="display:none">
      <div class="history-title">ROUND LOG</div>
      <div class="history-list" id="history-list"></div>
    </div>
  </div>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script>
// ── Firebase Init ─────────────────────────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyAt2LT1jpVN1CFujGjEFrsppEPA4Bd3KoI",
  authDomain: "apiok-a3c33.firebaseapp.com",
  databaseURL: "https://apiok-a3c33-default-rtdb.firebaseio.com",
  projectId: "apiok-a3c33",
  storageBucket: "apiok-a3c33.firebasestorage.app",
  messagingSenderId: "98238105265",
  appId: "1:98238105265:web:30307e5232d91c57310490"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ── SVG map ───────────────────────────────────────────────────
const svgMap = {
  rock: `<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
    <rect x="22" y="38" width="20" height="7" rx="3" fill="#6b6b88"/>
    <rect x="16" y="28" width="32" height="13" rx="4" fill="#7a7a9a"/>
    <rect x="20" y="19" width="28" height="12" rx="4" fill="#8a8aaa"/>
    <rect x="24" y="14" width="18" height="8"  rx="4" fill="#9090b8"/>
    <rect x="25" y="15" width="8"  height="4"  rx="2" fill="#a8a8cc" opacity="0.7"/>
    <rect x="17" y="30" width="5"  height="3"  rx="1" fill="#9595b5" opacity="0.5"/>
  </svg>`,
  paper: `<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
    <rect x="15" y="10" width="34" height="44" rx="3" fill="#e8e0c0"/>
    <rect x="15" y="10" width="34" height="7"  rx="3" fill="#d4cc8c"/>
    <rect x="21" y="24" width="22" height="2"  rx="1" fill="#a09878"/>
    <rect x="21" y="30" width="18" height="2"  rx="1" fill="#a09878"/>
    <rect x="21" y="36" width="20" height="2"  rx="1" fill="#a09878"/>
    <rect x="21" y="42" width="14" height="2"  rx="1" fill="#a09878"/>
    <rect x="18" y="13" width="2"  height="2"  rx="1" fill="#fff" opacity="0.4"/>
  </svg>`,
  scissors: `<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
    <circle cx="18" cy="50" r="8" fill="none" stroke="#8888aa" stroke-width="3"/>
    <circle cx="46" cy="50" r="8" fill="none" stroke="#8888aa" stroke-width="3"/>
    <line x1="24" y1="46" x2="46" y2="16" stroke="#aaaacc" stroke-width="5" stroke-linecap="round"/>
    <line x1="40" y1="46" x2="18" y2="16" stroke="#9090b8" stroke-width="5" stroke-linecap="round"/>
    <circle cx="32" cy="31" r="4" fill="#c084fc"/>
  </svg>`,
  hidden: `<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
    <rect x="12" y="12" width="40" height="40" rx="4" fill="#1a1a2a" stroke="#c084fc" stroke-width="1.5"/>
    <text x="32" y="38" font-family="monospace" font-size="20" fill="#c084fc" text-anchor="middle">?</text>
  </svg>`
};

// ── Local game state ──────────────────────────────────────────
const choices = ['rock', 'paper', 'scissors'];
let mode     = 'cpu';
let p1Score  = 0;
let p2Score  = 0;
let roundLog = [];
let p2State  = 'idle';
let p1Choice = null;

// ── Online state ──────────────────────────────────────────────
let onlineMode  = false;
let myRole      = null;   // 'p1' | 'p2'
let roomCode    = null;
let roomRef     = null;
let hasChosen   = false;
let roundDone   = false;

// ── DOM refs ──────────────────────────────────────────────────
const pHand     = document.getElementById('p-hand');
const cHand     = document.getElementById('c-hand');
const resultBar = document.getElementById('result-bar');
const turnInd   = document.getElementById('turn-indicator');
const coverScr  = document.getElementById('cover-screen');

// ── Mode switch ───────────────────────────────────────────────
function setMode(m) {
  if (onlineMode) return;
  mode = m;
  document.getElementById('btn-cpu').classList.toggle('active', m === 'cpu');
  document.getElementById('btn-2p').classList.toggle('active',  m === '2p');

  const p2box   = document.getElementById('p2-score-box');
  const p2label = document.getElementById('p2-label');
  const p2fig   = document.getElementById('p2-fighter-label');
  const p1fig   = document.getElementById('p1-fighter-label');

  if (m === '2p') {
    p2box.className      = 'score-box p2-box';
    p2label.textContent  = 'PLAYER 2';
    p2fig.textContent    = 'P2';
    p1fig.textContent    = 'P1';
    turnInd.style.display = 'block';
    setTurn('p1');
  } else {
    p2box.className      = 'score-box cpu-box';
    p2label.textContent  = 'CPU';
    p2fig.textContent    = 'CPU';
    p1fig.textContent    = 'YOU';
    turnInd.style.display = 'none';
    coverScr.classList.remove('active');
  }
  resetGame();
}

function setTurn(who) {
  if (who === 'p1') {
    turnInd.textContent = '▶ PLAYER 1 — CHOOSE YOUR WEAPON';
    turnInd.className   = 'turn-indicator p1';
  } else {
    turnInd.textContent = '▶ PLAYER 2 — CHOOSE YOUR WEAPON';
    turnInd.className   = 'turn-indicator p2';
  }
}

// ── Main input handler ────────────────────────────────────────
function handleChoice(choice) {
  if (onlineMode) { handleOnlineChoice(choice); return; }
  if (mode === 'cpu') playCPU(choice);
  else play2P(choice);
}

// ── CPU mode ──────────────────────────────────────────────────
function playCPU(playerChoice) {
  const cpuChoice = choices[Math.floor(Math.random() * 3)];
  const result    = getResult(playerChoice, cpuChoice);
  if (result === 'win')  p1Score++;
  if (result === 'lose') p2Score++;
  updateScores();
  setHand(pHand, playerChoice);
  setHand(cHand, cpuChoice);
  animateHands();
  setTimeout(() => {
    if (result === 'win')  { pHand.classList.add('winner'); cHand.classList.add('loser'); }
    if (result === 'lose') { cHand.classList.add('winner'); pHand.classList.add('loser'); }
    resultBar.className = 'result-bar ' + result;
    if (result === 'win')  resultBar.textContent = `YOU WIN!  ${n(playerChoice)} BEATS ${n(cpuChoice)}`;
    if (result === 'lose') resultBar.textContent = `YOU LOSE!  ${n(cpuChoice)} BEATS ${n(playerChoice)}`;
    if (result === 'draw') resultBar.textContent = `DRAW!  BOTH PICKED ${n(playerChoice)}`;
  }, 450);
  addLog({ playerChoice, cpuChoice, result, label: 'vs CPU' });
}

// ── 2P local mode ─────────────────────────────────────────────
function play2P(choice) {
  if (p2State === 'idle') {
    p1Choice = choice;
    setHand(pHand, 'hidden');
    resetHand(cHand);
    resultBar.className   = 'result-bar';
    resultBar.textContent = 'P1 HAS CHOSEN — PASS THE DEVICE';
    coverScr.classList.add('active');
    p2State = 'waiting_p2';
  } else if (p2State === 'waiting_p2') {
    const result = getResult(p1Choice, choice);
    coverScr.classList.remove('active');
    if (result === 'win')  p1Score++;
    if (result === 'lose') p2Score++;
    updateScores();
    setHand(pHand, p1Choice);
    setHand(cHand, choice);
    animateHands();
    setTimeout(() => {
      if (result === 'win')  { pHand.classList.add('winner'); cHand.classList.add('loser'); }
      if (result === 'lose') { cHand.classList.add('winner'); pHand.classList.add('loser'); }
      const label = result === 'win' ? 'p1win' : result === 'lose' ? 'p2win' : 'draw';
      resultBar.className = 'result-bar ' + label;
      if (result === 'win')  resultBar.textContent = `P1 WINS!  ${n(p1Choice)} BEATS ${n(choice)}`;
      if (result === 'lose') resultBar.textContent = `P2 WINS!  ${n(choice)} BEATS ${n(p1Choice)}`;
      if (result === 'draw') resultBar.textContent = `DRAW!  BOTH PICKED ${n(p1Choice)}`;
    }, 450);
    addLog({ playerChoice: p1Choice, cpuChoice: choice, result,
      label: result === 'win' ? 'P1 WIN' : result === 'lose' ? 'P2 WIN' : 'DRAW',
      outClass: result === 'win' ? 'p1win' : result === 'lose' ? 'p2win' : 'draw'
    });
    p2State = 'idle'; p1Choice = null;
    setTurn('p1');
  }
}

function revealForP2() {
  coverScr.classList.remove('active');
  setTurn('p2');
  p2State = 'waiting_p2';
}

// ── Helpers ───────────────────────────────────────────────────
function getResult(p, c) {
  if (p === c) return 'draw';
  const wins = { rock: 'scissors', scissors: 'paper', paper: 'rock' };
  return wins[p] === c ? 'win' : 'lose';
}
function n(c) { return c.toUpperCase(); }

function setHand(el, choice) {
  el.classList.remove('winner', 'loser', 'hidden-choice');
  el.innerHTML = svgMap[choice] || '<span class="placeholder">?</span>';
  if (choice === 'hidden') el.classList.add('hidden-choice');
}
function resetHand(el) {
  el.classList.remove('winner', 'loser', 'hidden-choice', 'shake');
  el.innerHTML = '<span class="placeholder">?</span>';
}
function animateHands() {
  pHand.classList.remove('shake', 'winner', 'loser');
  cHand.classList.remove('shake', 'winner', 'loser');
  void pHand.offsetWidth;
  pHand.classList.add('shake');
  cHand.classList.add('shake');
}
function updateScores() {
  document.getElementById('p-score').textContent = String(p1Score).padStart(2, '0');
  document.getElementById('c-score').textContent = String(p2Score).padStart(2, '0');
}
function addLog(entry) {
  roundLog.unshift(entry);
  if (roundLog.length > 6) roundLog.pop();
  renderLog();
}
function renderLog() {
  const wrap  = document.getElementById('history-wrap');
  const list  = document.getElementById('history-list');
  const names = { rock: 'Rock', paper: 'Paper', scissors: 'Scissors' };
  wrap.style.display = 'block';
  list.innerHTML = roundLog.map(r => {
    const outClass = r.outClass || r.result;
    const outText  = r.label   || r.result.toUpperCase();
    return `<div class="history-item">
      <span>${names[r.playerChoice]} vs ${names[r.cpuChoice]}</span>
      <span class="outcome ${outClass}">${outText}</span>
    </div>`;
  }).join('');
}
function resetGame() {
  if (onlineMode) return;
  p1Score = p2Score = 0;
  roundLog = [];
  p2State  = 'idle';
  p1Choice = null;
  updateScores();
  resetHand(pHand);
  resetHand(cHand);
  resultBar.className   = 'result-bar';
  resultBar.textContent = 'CHOOSE YOUR WEAPON';
  coverScr.classList.remove('active');
  document.getElementById('history-wrap').style.display = 'none';
  setChoiceBtnsEnabled(true);
  if (mode === '2p') setTurn('p1');
}
function setChoiceBtnsEnabled(on) {
  ['btn-rock','btn-paper','btn-scissors'].forEach(id => {
    document.getElementById(id).disabled = !on;
  });
}

// ── Online: Firebase room functions ───────────────────────────
function genCode() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  return Array.from({ length: 4 }, () => chars[Math.floor(Math.random() * chars.length)]).join('');
}

function openCreateRoom() {
  if (onlineMode) return;
  const code = genCode();
  document.getElementById('generated-code').textContent = code;
  document.getElementById('create-status').textContent  = 'Creating room...';
  document.getElementById('create-modal-backdrop').classList.add('open');

  db.ref('rooms/' + code).set({
    status: 'waiting',
    p1Score: 0, p2Score: 0,
    p1Choice: null, p2Choice: null,
    created: Date.now()
  }).then(() => {
    roomCode = code;
    myRole   = 'p1';
    document.getElementById('create-status').textContent = 'Waiting for opponent to join...';
    listenToRoom(code);
  }).catch(err => {
    document.getElementById('create-status').textContent = 'Error: ' + err.message;
  });
}

function cancelCreate() {
  // If P1 cancels before anyone joined, delete the room
  if (roomCode && myRole === 'p1') {
    if (roomRef) { roomRef.off(); roomRef = null; }
    db.ref('rooms/' + roomCode).remove();
    roomCode = null; myRole = null;
  }
  closeModals();
}

function copyRoomCode() {
  const code = document.getElementById('generated-code').textContent;
  navigator.clipboard.writeText(code)
    .then(() => { document.getElementById('create-status').textContent = 'Code copied! Share with your opponent.'; })
    .catch(()  => { document.getElementById('create-status').textContent = 'Your code: ' + code; });
}

function openJoinRoom() {
  if (onlineMode) return;
  document.getElementById('room-code-input').value = '';
  document.getElementById('join-status').textContent = '';
  document.getElementById('join-modal-backdrop').classList.add('open');
  setTimeout(() => document.getElementById('room-code-input').focus(), 50);
}

function submitJoinRoom() {
  const code    = document.getElementById('room-code-input').value.trim().toUpperCase();
  const statusEl = document.getElementById('join-status');
  if (code.length !== 4) {
    statusEl.style.color = 'var(--lose)';
    statusEl.textContent = 'Enter a 4-character code!';
    return;
  }
  statusEl.style.color = 'var(--accent3)';
  statusEl.textContent = 'Looking for room...';

  db.ref('rooms/' + code).once('value').then(snap => {
    const data = snap.val();
    if (!data) {
      statusEl.style.color = 'var(--lose)';
      statusEl.textContent = 'Room not found!';
      return;
    }
    if (data.status !== 'waiting') {
      statusEl.style.color = 'var(--lose)';
      statusEl.textContent = 'Room is full!';
      return;
    }
    roomCode = code;
    myRole   = 'p2';
    statusEl.textContent = 'Joining ' + code + '...';
    db.ref('rooms/' + code).update({ status: 'playing' }).then(() => {
      closeModals();
      listenToRoom(code);
      startOnlineGame();
    });
  }).catch(err => {
    statusEl.style.color = 'var(--lose)';
    statusEl.textContent = 'Error: ' + err.message;
  });
}

function closeModals() {
  document.getElementById('create-modal-backdrop').classList.remove('open');
  document.getElementById('join-modal-backdrop').classList.remove('open');
}

// ── Online: Listen to Firebase ────────────────────────────────
function listenToRoom(code) {
  roomRef = db.ref('rooms/' + code);
  // Auto-delete room if this player disconnects
  roomRef.onDisconnect().remove();

  roomRef.on('value', snap => {
    const data = snap.val();

    // Room deleted — opponent left
    if (!data) {
      if (onlineMode) handleOpponentLeft();
      return;
    }

    // P2 joined — P1 sees status flip to 'playing'
    if (myRole === 'p1' && data.status === 'playing' && !onlineMode) {
      closeModals();
      startOnlineGame();
    }

    if (!onlineMode) return;

    // Sync scores
    p1Score = data.p1Score || 0;
    p2Score = data.p2Score || 0;
    updateScores();

    // Both chose and round not yet processed
    if (data.p1Choice && data.p2Choice && !roundDone) {
      roundDone = true;
      revealOnlineResult(data.p1Choice, data.p2Choice, data.p1Score || 0, data.p2Score || 0);
    }

    // Choices cleared → new round ready
    if (!data.p1Choice && !data.p2Choice && roundDone) {
      setTimeout(() => {
        roundDone  = false;
        hasChosen  = false;
        resetHand(pHand);
        resetHand(cHand);
        resultBar.className   = 'result-bar';
        resultBar.textContent = 'CHOOSE YOUR WEAPON';
        setChoiceBtnsEnabled(true);
      }, 400);
    }
  });
}

function startOnlineGame() {
  onlineMode = true;
  hasChosen  = false;
  roundDone  = false;
  p1Score    = 0;
  p2Score    = 0;
  roundLog   = [];
  updateScores();
  resetHand(pHand);
  resetHand(cHand);
  setChoiceBtnsEnabled(true);

  // Labels: p-hand (left) = P1, c-hand (right) = P2
  document.getElementById('p1-fighter-label').textContent = myRole === 'p1' ? 'YOU' : 'OPP';
  document.getElementById('p2-fighter-label').textContent = myRole === 'p2' ? 'YOU' : 'OPP';
  document.getElementById('p1-label').textContent         = myRole === 'p1' ? 'YOU' : 'OPP';
  document.getElementById('p2-label').textContent         = myRole === 'p2' ? 'YOU' : 'OPP';
  document.getElementById('p2-score-box').className       = 'score-box p2-box';

  turnInd.style.display = 'block';
  turnInd.className     = 'turn-indicator online';
  turnInd.textContent   = '🌐 ONLINE · ROOM: ' + roomCode + ' · ' + (myRole === 'p1' ? 'P1' : 'P2');

  resultBar.className   = 'result-bar';
  resultBar.textContent = 'CHOOSE YOUR WEAPON';

  document.getElementById('history-wrap').style.display = 'none';
  document.getElementById('leave-btn').style.display    = 'block';
  document.getElementById('room-row').style.display     = 'none';
  document.getElementById('reset-btn').style.display    = 'none';
  document.getElementById('btn-cpu').disabled = true;
  document.getElementById('btn-2p').disabled  = true;
  coverScr.classList.remove('active');
}

// ── Online: Choice ────────────────────────────────────────────
function handleOnlineChoice(choice) {
  if (hasChosen || roundDone) return;
  hasChosen = true;
  setChoiceBtnsEnabled(false);

  // Show my hand on my side, question mark on opponent's
  if (myRole === 'p1') { setHand(pHand, choice); setHand(cHand, 'hidden'); }
  else                  { setHand(pHand, 'hidden'); setHand(cHand, choice); }

  resultBar.className   = 'result-bar';
  resultBar.textContent = 'WAITING FOR OPPONENT...';

  const update = {};
  update[myRole + 'Choice'] = choice;
  roomRef.update(update);
}

// ── Online: Reveal ────────────────────────────────────────────
function revealOnlineResult(p1c, p2c, curP1Score, curP2Score) {
  setHand(pHand, p1c);   // left  = P1
  setHand(cHand, p2c);   // right = P2
  animateHands();

  const rawResult = getResult(p1c, p2c);           // from P1's POV
  const myResult  = myRole === 'p1' ? rawResult
    : rawResult === 'win' ? 'lose' : rawResult === 'lose' ? 'win' : 'draw';
  const myChoice  = myRole === 'p1' ? p1c : p2c;
  const oppChoice = myRole === 'p1' ? p2c : p1c;

  setTimeout(() => {
    if (rawResult === 'win')  { pHand.classList.add('winner'); cHand.classList.add('loser'); }
    if (rawResult === 'lose') { cHand.classList.add('winner'); pHand.classList.add('loser'); }

    if (myResult === 'win')  { resultBar.className = 'result-bar win';  resultBar.textContent = `YOU WIN!  ${n(myChoice)} BEATS ${n(oppChoice)}`; }
    if (myResult === 'lose') { resultBar.className = 'result-bar lose'; resultBar.textContent = `YOU LOSE!  ${n(oppChoice)} BEATS ${n(myChoice)}`; }
    if (myResult === 'draw') { resultBar.className = 'result-bar draw'; resultBar.textContent = `DRAW!  BOTH PICKED ${n(myChoice)}`; }
  }, 450);

  // Only P1 updates scores and resets choices in Firebase (avoids double-write)
  if (myRole === 'p1') {
    const newP1 = curP1Score + (rawResult === 'win'  ? 1 : 0);
    const newP2 = curP2Score + (rawResult === 'lose' ? 1 : 0);
    setTimeout(() => {
      roomRef.update({ p1Choice: null, p2Choice: null, p1Score: newP1, p2Score: newP2 });
    }, 2500);
  }
}

// ── Online: Leave / Disconnect ────────────────────────────────
function leaveRoom() {
  if (roomRef) {
    roomRef.off();
    roomRef.remove();   // delete room — triggers opponent's "opponent left"
    roomRef = null;
  }
  onlineMode = false; myRole = null; roomCode = null;
  hasChosen  = false; roundDone = false;

  document.getElementById('leave-btn').style.display  = 'none';
  document.getElementById('reset-btn').style.display  = 'block';
  document.getElementById('room-row').style.display   = 'flex';
  document.getElementById('btn-cpu').disabled = false;
  document.getElementById('btn-2p').disabled  = false;
  turnInd.style.display = 'none';

  setMode('cpu');
}

function handleOpponentLeft() {
  resultBar.className   = 'result-bar lose';
  resultBar.textContent = 'OPPONENT DISCONNECTED!';
  // Detach listener without deleting (room already gone)
  if (roomRef) { roomRef.off(); roomRef = null; }
  onlineMode = false; myRole = null; roomCode = null;
  hasChosen  = false; roundDone = false;

  setTimeout(() => {
    document.getElementById('leave-btn').style.display  = 'none';
    document.getElementById('reset-btn').style.display  = 'block';
    document.getElementById('room-row').style.display   = 'flex';
    document.getElementById('btn-cpu').disabled = false;
    document.getElementById('btn-2p').disabled  = false;
    turnInd.style.display = 'none';
    setMode('cpu');
  }, 2000);
}

// ── Particle background ───────────────────────────────────────
const canvas = document.getElementById('bg-canvas');
const ctx    = canvas.getContext('2d');
let particles = [];
const PARTICLE_COUNT = 60;

function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }

function mkParticle() {
  const colors = ['rgba(107,255,216,','rgba(192,132,252,','rgba(240,224,64,','rgba(255,107,107,'];
  const c = colors[Math.floor(Math.random() * colors.length)];
  return { x: Math.random()*canvas.width, y: Math.random()*canvas.height, r: Math.random()*1.5+0.3,
    dx: (Math.random()-0.5)*0.3, dy: (Math.random()-0.5)*0.3, color: c,
    alpha: Math.random()*0.5+0.1, pulse: Math.random()*Math.PI*2 };
}

function initParticles() { particles = Array.from({ length: PARTICLE_COUNT }, mkParticle); }

function animateParticles() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  particles.forEach(p => {
    p.x += p.dx; p.y += p.dy; p.pulse += 0.02;
    const a = p.alpha * (0.7 + 0.3 * Math.sin(p.pulse));
    if (p.x < 0) p.x = canvas.width;  if (p.x > canvas.width)  p.x = 0;
    if (p.y < 0) p.y = canvas.height; if (p.y > canvas.height) p.y = 0;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
    ctx.fillStyle = p.color + a + ')'; ctx.fill();
  });
  requestAnimationFrame(animateParticles);
}

resize(); initParticles(); animateParticles();
window.addEventListener('resize', resize);
</script>
